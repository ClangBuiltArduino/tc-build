name: Check for Updates

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch new versions and update versions.conf
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          
          get_gh_release() {
            local repo=$1
            local prefix=$2
            gh api "repos/$repo/releases" -q 'map(select(.prerelease == false and .draft == false)) | .[0].tag_name' \
              | sed "s/^$prefix//" | sed 's/^v//' | sed 's/-release$//'
          }
          
          get_gnu_version() {
            local project=$1
            curl -sL "https://ftp.gnu.org/gnu/$project/" | grep -oE "href=\"$project-[0-9]+\.[0-9]+(\.[0-9]+)?\.tar" | grep -oE "[0-9]+\.[0-9]+(\.[0-9]+)?" | sort -V | tail -1
          }

          get_newlib_version() {
            curl -sL "https://sourceware.org/pub/newlib/" | grep -oE "href=\"newlib-[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?\.tar" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?" | sort -V | tail -1
          }

          get_gcc_version() {
            curl -sL "https://gcc.gnu.org/releases.html" | grep -oE "GCC [0-9]+\.[0-9]+(\.[0-9]+)?" | head -1 | grep -oE "[0-9]+\.[0-9]+(\.[0-9]+)?"
          }

          UPDATE_MADE=0

          echo "Checking versions..."
          
          LLVM_NEW=$(get_gh_release "llvm/llvm-project" "llvmorg-")
          ZLIB_NEW=$(get_gh_release "zlib-ng/zlib-ng" "")
          ZSTD_NEW=$(get_gh_release "facebook/zstd" "")
          
          # AVR-LIBC uses underscores in their release tags (e.g., avr-libc-2_3_1-release)
          AVR_LIBC_NEW=$(get_gh_release "avrdudes/avr-libc" "avr-libc-")
          AVR_LIBC_NEW=$(echo "$AVR_LIBC_NEW" | tr '_' '.')
          
          BINUTILS_NEW=$(get_gnu_version "binutils")
          GCC_NEW=$(get_gcc_version)
          NEWLIB_NEW=$(get_newlib_version)

          update_conf() {
            local key=$1
            local new_val=$2
            if [ -n "$new_val" ] && [ "$new_val" != "null" ]; then
              local old_val=$(grep "^${key}=" versions.conf | cut -d'"' -f2 || true)
              # update it
              if [ -n "$old_val" ] && [ "$old_val" != "$new_val" ]; then
                sed -i "s/^${key}=\".*\"/${key}=\"${new_val}\"/" versions.conf
                echo "Updated ${key}: ${old_val} -> ${new_val}"
                UPDATE_MADE=1
              fi
            fi
          }

          update_conf "LLVM_VERSION" "$LLVM_NEW"
          update_conf "BINUTILS_VERSION" "$BINUTILS_NEW"
          update_conf "GCC_VERSION" "$GCC_NEW"
          update_conf "AVR_LIBC_VERSION" "$AVR_LIBC_NEW"
          update_conf "NEWLIB_VERSION" "$NEWLIB_NEW"
          update_conf "ZLIB_VERSION" "$ZLIB_NEW"
          update_conf "ZSTD_VERSION" "$ZSTD_NEW"
          
          echo "UPDATE_MADE=$UPDATE_MADE" >> $GITHUB_ENV

      - name: Create Pull Request
        if: env.UPDATE_MADE == '1'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update versions in versions.conf"
          title: "chore: Update toolchain versions"
          body: "Automated PR to update software versions in `versions.conf`."
          branch: "update-versions"
          base: "main"
          delete-branch: true
